<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780" style="font-family: 'JetBrains Mono', monospace; background: #0D0F12;">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5A6080"/>
    </marker>
    <marker id="arrow-ok" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00C896"/>
    </marker>
    <marker id="arrow-risk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F5A623"/>
    </marker>
    <marker id="arrow-blocked" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E5383B"/>
    </marker>
    <marker id="arrow-done" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4A7CFF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#E8EAF0">EWIS Planning Layer — Software Flow</text>
  <text x="550" y="54" text-anchor="middle" font-size="10" fill="#5A6080">Gestão de visibilidade e planeamento de cablagens aeroespaciais</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 0: Data Sources -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="80" y="88" font-size="9" fill="#5A6080" letter-spacing="2">FONTES DE DADOS</text>
  <line x1="60" y1="92" x2="400" y2="92" stroke="#252A38" stroke-width="1"/>

  <!-- ElecDesign box -->
  <rect x="60" y="100" width="160" height="60" rx="6" fill="#141720" stroke="#4A7CFF" stroke-width="1.5"/>
  <text x="140" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#4A7CFF">ElecDesign</text>
  <text x="140" y="137" text-anchor="middle" font-size="8.5" fill="#8A90A8">F2→F7 JSON outputs</text>
  <text x="140" y="150" text-anchor="middle" font-size="8" fill="#5A6080">(integração futura)</text>

  <!-- Mock / LocalStorage box -->
  <rect x="240" y="100" width="160" height="60" rx="6" fill="#141720" stroke="#252A38" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="320" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#8A90A8">Mock Data</text>
  <text x="320" y="137" text-anchor="middle" font-size="8.5" fill="#5A6080">localStorage</text>
  <text x="320" y="150" text-anchor="middle" font-size="8" fill="#5A6080">(fase actual)</text>

  <!-- arrows to App State -->
  <line x1="140" y1="160" x2="140" y2="195" stroke="#4A7CFF" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-done)"/>
  <line x1="320" y1="160" x2="320" y2="195" stroke="#5A6080" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 1: App State -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="60" y="195" width="440" height="64" rx="6" fill="#1C2030" stroke="#252A38" stroke-width="1.5"/>
  <text x="280" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#E8EAF0">App State (useAppState + localStorage)</text>
  <!-- data types inline -->
  <rect x="75"  y="224" width="70"  height="22" rx="3" fill="#141720" stroke="#252A38"/>
  <text x="110" y="239" text-anchor="middle" font-size="8" fill="#8A90A8">Harness[ ]</text>
  <rect x="153" y="224" width="70"  height="22" rx="3" fill="#141720" stroke="#252A38"/>
  <text x="188" y="239" text-anchor="middle" font-size="8" fill="#8A90A8">Milestone[ ]</text>
  <rect x="231" y="224" width="55"  height="22" rx="3" fill="#141720" stroke="#252A38"/>
  <text x="258" y="239" text-anchor="middle" font-size="8" fill="#8A90A8">ECN[ ]</text>
  <rect x="294" y="224" width="55"  height="22" rx="3" fill="#141720" stroke="#252A38"/>
  <text x="321" y="239" text-anchor="middle" font-size="8" fill="#8A90A8">Person[ ]</text>
  <rect x="357" y="224" width="70"  height="22" rx="3" fill="#141720" stroke="#252A38"/>
  <text x="392" y="239" text-anchor="middle" font-size="8" fill="#8A90A8">Allocation[ ]</text>
  <rect x="435" y="224" width="52"  height="22" rx="3" fill="#141720" stroke="#252A38"/>
  <text x="461" y="239" text-anchor="middle" font-size="8" fill="#5A6080">persist ↕</text>

  <!-- arrows to views -->
  <line x1="150" y1="259" x2="150" y2="310" stroke="#5A6080" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="259" x2="610" y2="310" stroke="#5A6080" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="259" x2="920" y2="310" stroke="#5A6080" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 2: Three Views -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="80" y="302" font-size="9" fill="#5A6080" letter-spacing="2">VISTAS</text>

  <!-- VISTA 1 — Harness Pipeline -->
  <rect x="30" y="310" width="240" height="50" rx="6" fill="#141720" stroke="#4A7CFF" stroke-width="2"/>
  <text x="150" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#4A7CFF">Vista 1 — Harness Pipeline</text>
  <text x="150" y="347" text-anchor="middle" font-size="8.5" fill="#8A90A8">Uso diário · estado de execução</text>

  <!-- VISTA 2 — Impact Radar -->
  <rect x="490" y="310" width="240" height="50" rx="6" fill="#141720" stroke="#F5A623" stroke-width="2"/>
  <text x="610" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#F5A623">Vista 2 — Impact Radar</text>
  <text x="610" y="347" text-anchor="middle" font-size="8.5" fill="#8A90A8">Reativo · propagação de ECN</text>

  <!-- VISTA 3 — Capacity Heatmap -->
  <rect x="800" y="310" width="240" height="50" rx="6" fill="#141720" stroke="#9B59B6" stroke-width="2"/>
  <text x="920" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#9B59B6">Vista 3 — Capacity Heatmap</text>
  <text x="920" y="347" text-anchor="middle" font-size="8.5" fill="#8A90A8">Semanal · carga da equipa</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- VISTA 1 DETAIL -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <line x1="150" y1="360" x2="150" y2="390" stroke="#4A7CFF" stroke-width="1" marker-end="url(#arrow-done)"/>

  <!-- Milestone Rows sub-box -->
  <rect x="30" y="390" width="240" height="48" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="150" y="408" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Milestone Rows (F2–F6)</text>
  <text x="150" y="423" text-anchor="middle" font-size="8" fill="#5A6080">Por projeto · P: vs A: · done/risk/blocked/open</text>
  <line x1="150" y1="438" x2="150" y2="460" stroke="#5A6080" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Pipeline Grid sub-box -->
  <rect x="30" y="460" width="240" height="48" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="150" y="478" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Pipeline Grid F7</text>
  <text x="150" y="493" text-anchor="middle" font-size="8" fill="#5A6080">Harness × 8 etapas · agrupado por projeto</text>
  <line x1="150" y1="508" x2="150" y2="530" stroke="#5A6080" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Three actions from Pipeline Grid -->
  <rect x="30" y="530" width="240" height="130" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="150" y="548" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Ações do Engenheiro</text>

  <!-- Action: Advance Stage -->
  <rect x="42" y="556" width="216" height="28" rx="3" fill="#141720" stroke="#00C896" stroke-width="1"/>
  <text x="150" y="568" text-anchor="middle" font-size="8.5" font-weight="600" fill="#00C896">Avançar etapa</text>
  <text x="150" y="579" text-anchor="middle" font-size="7.5" fill="#5A6080">Click célula seguinte → diálogo confirmação → stage+1</text>

  <!-- Action: Register Block -->
  <rect x="42" y="590" width="216" height="28" rx="3" fill="#141720" stroke="#E5383B" stroke-width="1"/>
  <text x="150" y="602" text-anchor="middle" font-size="8.5" font-weight="600" fill="#E5383B">Registar bloqueio</text>
  <text x="150" y="613" text-anchor="middle" font-size="7.5" fill="#5A6080">Click harness → form: motivo + responsável → blocked=true</text>

  <!-- Action: Resolve Block -->
  <rect x="42" y="624" width="216" height="28" rx="3" fill="#141720" stroke="#00C896" stroke-width="1"/>
  <text x="150" y="636" text-anchor="middle" font-size="8.5" font-weight="600" fill="#00C896">Resolver bloqueio</text>
  <text x="150" y="647" text-anchor="middle" font-size="7.5" fill="#5A6080">Click harness bloqueado → nota de resolução → blocked=false</text>

  <!-- Invariant note -->
  <rect x="42" y="657" width="216" height="16" rx="2" fill="#E5383B11" stroke="#E5383B22"/>
  <text x="150" y="669" text-anchor="middle" font-size="7.5" fill="#E5383B">Harness bloqueado não avança de etapa</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- VISTA 2 DETAIL -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <line x1="610" y1="360" x2="610" y2="390" stroke="#F5A623" stroke-width="1" marker-end="url(#arrow-risk)"/>

  <rect x="490" y="390" width="240" height="48" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="610" y="408" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Lista de ECNs</text>
  <text x="610" y="423" text-anchor="middle" font-size="8" fill="#5A6080">pending / approved / rejected · harnesses afetados</text>
  <line x1="610" y1="438" x2="610" y2="460" stroke="#5A6080" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="490" y="460" width="240" height="48" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="610" y="478" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Seleccionar ECN</text>
  <text x="610" y="493" text-anchor="middle" font-size="8" fill="#5A6080">Trigger: ECN registado / aprovação pendente</text>
  <line x1="610" y1="508" x2="610" y2="530" stroke="#5A6080" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="490" y="530" width="240" height="110" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="610" y="548" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Grafo de Propagação (SVG)</text>

  <rect x="502" y="556" width="216" height="22" rx="3" fill="#141720" stroke="#4A7CFF" stroke-width="1"/>
  <text x="610" y="571" text-anchor="middle" font-size="8" fill="#4A7CFF">ECN (centro) → Harnesses afetados</text>

  <rect x="502" y="584" width="216" height="22" rx="3" fill="#141720" stroke="#8A90A8" stroke-width="1"/>
  <text x="610" y="599" text-anchor="middle" font-size="8" fill="#8A90A8">Harnesses → Itens de BoM (dashed)</text>

  <rect x="502" y="612" width="216" height="22" rx="3" fill="#141720" stroke="#E5383B" stroke-width="1"/>
  <text x="610" y="627" text-anchor="middle" font-size="8" fill="#E5383B">Dot vermelho = harness bloqueado</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- VISTA 3 DETAIL -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <line x1="920" y1="360" x2="920" y2="390" stroke="#9B59B6" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="800" y="390" width="240" height="48" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="920" y="408" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Grid Pessoas × Semanas</text>
  <text x="920" y="423" text-anchor="middle" font-size="8" fill="#5A6080">Todos os projetos · 4 semanas · 40h/sem ref.</text>
  <line x1="920" y1="438" x2="920" y2="460" stroke="#5A6080" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="800" y="460" width="240" height="110" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="920" y="478" text-anchor="middle" font-size="9" font-weight="600" fill="#E8EAF0">Célula: Pessoa × Semana</text>

  <rect x="812" y="486" width="216" height="20" rx="3" fill="#00C89622" stroke="#00C89644"/>
  <text x="920" y="500" text-anchor="middle" font-size="8" fill="#00C896">≤ 80% — normal</text>

  <rect x="812" y="510" width="216" height="20" rx="3" fill="#F5A62322" stroke="#F5A62344"/>
  <text x="920" y="524" text-anchor="middle" font-size="8" fill="#F5A623">80–130% — risco de sobrecarga</text>

  <rect x="812" y="534" width="216" height="20" rx="3" fill="#E5383B22" stroke="#E5383B44"/>
  <text x="920" y="548" text-anchor="middle" font-size="8" fill="#E5383B">&gt; 130% — sobrecarga</text>

  <rect x="812" y="558" width="216" height="22" rx="3" fill="#141720" stroke="#252A38"/>
  <text x="920" y="573" text-anchor="middle" font-size="8" fill="#5A6080">Dots coloridos por projecto (FALCON/ALPHA/…)</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Shared rule + future integration -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <line x1="60" y1="700" x2="1040" y2="700" stroke="#252A38" stroke-width="1"/>
  <text x="550" y="718" text-anchor="middle" font-size="9" fill="#5A6080" letter-spacing="1">REGRAS DE NEGÓCIO GLOBAIS</text>

  <rect x="60"  y="726" width="190" height="34" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="155" y="740" text-anchor="middle" font-size="8" fill="#8A90A8">F2–F6 = milestones (eventos)</text>
  <text x="155" y="752" text-anchor="middle" font-size="7.5" fill="#5A6080">Data planeada vs. real · sem sub-etapas</text>

  <rect x="262" y="726" width="190" height="34" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="357" y="740" text-anchor="middle" font-size="8" fill="#8A90A8">F7 = pipeline por harness</text>
  <text x="357" y="752" text-anchor="middle" font-size="7.5" fill="#5A6080">8 etapas sequenciais por unidade</text>

  <rect x="464" y="726" width="190" height="34" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="559" y="740" text-anchor="middle" font-size="8" fill="#8A90A8">ECN afeta harnesses específicos</text>
  <text x="559" y="752" text-anchor="middle" font-size="7.5" fill="#5A6080">Não o projecto inteiro</text>

  <rect x="666" y="726" width="190" height="34" rx="4" fill="#1C2030" stroke="#252A38"/>
  <text x="761" y="740" text-anchor="middle" font-size="8" fill="#8A90A8">Pool de pessoas partilhada</text>
  <text x="761" y="752" text-anchor="middle" font-size="7.5" fill="#5A6080">Multi-projecto · carga acumulada</text>

  <rect x="868" y="726" width="190" height="34" rx="4" fill="#1C2030" stroke="#E5383B22"/>
  <text x="963" y="740" text-anchor="middle" font-size="8" fill="#E5383B">Bloqueio ≠ etapa fixa</text>
  <text x="963" y="752" text-anchor="middle" font-size="7.5" fill="#5A6080">Overlay em qualquer etapa · manual</text>
</svg>
